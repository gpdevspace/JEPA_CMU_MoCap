infrastructure:
  device: "mps"
  seed: 42

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  downsample_rate: 4
  horizons: [3, 5, 8]
  batch_size: 256

model:
  pose_dim: 93          # Dynamically overridden by actual parsed joint count * 3
  repr_dim: 256
  proj_dim: 256
  pred_dim: 256
  latent_dim: 32
  num_classes: 6        # Walking, Running, Jumping, Boxing, Dancing, etc.

training:
  use_latent: true     # Set true for Phase 2 latent-conditioned training
  epochs: 15
  lr: 0.001
  weight_decay: 1e-5
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  # vicreg block is dead — kept for reference, not used by compute_jepa_loss
  vicreg:
    sim_weight: 0.0
    var_weight: 0.0
    cov_weight: 0.0
  kinematic:
    bone_weight: 0.0

loss:
  invariance_weight: 1.0
  variance_weight: 5.0  # Raised from 1.0 — threshold fix means this now actually fires