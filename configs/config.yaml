infrastructure:
  device: "mps"
  seed: 42

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  downsample_rate: 4
  horizons: [3, 5, 8]
  batch_size: 256

model:
  pose_dim: 93          # Dynamically overridden by actual parsed joint count * 3
  repr_dim: 256
  proj_dim: 256
  pred_dim: 256
  latent_dim: 32
  num_classes: 3        # Walking, Jumping, Boxing, etc.

training:
  use_latent: false    # v1: unconditioned predictor (action labels used only for eval)
  epochs: 15
  lr: 0.001
  weight_decay: 1e-5
  ema_momentum_start: 0.996
  ema_momentum_end: 0.999
  loss:
    var_weight: 1.0      # VICReg variance hinge (anti-collapse)
    cov_weight: 0.05     # VICReg covariance decorrelation
    recon_weight: 1.0    # FK decoder reconstruction (latent -> pose)